<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<meta name="format-detection" content="telephone=no, date=no, address=no, email=no" />
<title>Profilim</title>
<link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="phone">

    <!-- Purple header -->
    <header class="hero">
      <button class="avatar-wrap" id="avatarBtn" aria-label="Kullanıcı değiştir">
        <img id="avatarImg" src="icons/isilay_pp.png" alt="" class="avatar"/>
      </button>
      <div class="user-name" id="userName">IŞILAY YUDUM YAŞA</div>
      <div class="user-phone" id="userPhone">000***85</div>
    </header>

    <!-- White menu card -->
    <main class="menu-card">
      <button class="menu-item">
        <span class="mi-icon">
          <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="#1d1d1f" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 9.5l9-4.5 9 4.5-9 4.5z"/>
            <path d="M7 11.2v3.3c0 1.5 2.3 3 5 3s5-1.5 5-3v-3.3"/>
          </svg>
        </span>
        <span class="mi-label">Hesabım</span>
        <span class="mi-chevron">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="#9aa6b2" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 6 15 12 9 18"/></svg>
        </span>
      </button>

      <div class="mi-divider"></div>

      <button class="menu-item">
        <span class="mi-icon">
          <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="#1d1d1f" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="9"/>
            <path d="M9.6 9.5c.3-1.3 1.3-2 2.5-2 1.5 0 2.5 1 2.5 2.3 0 1.4-1.3 1.9-2 2.5-.5.4-.6 1-.6 1.7"/>
            <circle cx="12" cy="17" r="0.9" fill="#1d1d1f" stroke="none"/>
          </svg>
        </span>
        <span class="mi-label">Yardım</span>
        <span class="mi-chevron">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="#9aa6b2" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 6 15 12 9 18"/></svg>
        </span>
      </button>

      <div class="mi-divider"></div>

      <button class="menu-item">
        <span class="mi-icon">
          <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="#1d1d1f" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="9"/>
            <path d="M3 12h18"/>
            <path d="M12 3a14 14 0 010 18"/>
            <path d="M12 3a14 14 0 000 18"/>
          </svg>
        </span>
        <span class="mi-label">Dil Seçeneği</span>
        <span class="mi-chevron">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="#9aa6b2" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 6 15 12 9 18"/></svg>
        </span>
      </button>

      <div class="mi-divider"></div>

      <button class="menu-item">
        <span class="mi-icon">
          <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="#1d1d1f" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
            <path d="M5 4v17"/>
            <path d="M5 5c4-2 7 2 11 0v8c-4 2-7-2-11 0"/>
          </svg>
        </span>
        <span class="mi-label">Duyuru Tercihlerim</span>
        <span class="mi-chevron">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="#9aa6b2" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 6 15 12 9 18"/></svg>
        </span>
      </button>

      <div class="mi-divider"></div>

      <button class="menu-item logout">
        <span class="mi-icon">
          <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="#ef4444" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M14 4h5v16h-5"/>
            <path d="M10 8l-4 4 4 4"/>
            <path d="M6 12h11"/>
          </svg>
        </span>
        <span class="mi-label">Çıkış Yap</span>
        <span class="mi-chevron">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="#ef4444" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 6 15 12 9 18"/></svg>
        </span>
      </button>
    </main>

    <!-- Bottom navigation -->
    <nav class="bottom-nav">
      <button class="nav-item">
        <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="#1d1d1f" stroke-width="1.6" stroke-linejoin="round">
          <path d="M12 3l9 5v8l-9 5-9-5V8z"/>
          <path d="M3 8l9 5 9-5"/>
          <path d="M12 13v8"/>
        </svg>
        <span>Hizmetler</span>
      </button>

      <button class="nav-item">
        <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="#1d1d1f" stroke-width="1.6" stroke-linejoin="round">
          <rect x="3" y="8" width="18" height="13" rx="1.5"/>
          <path d="M3 11h18"/>
          <path d="M12 8v13"/>
          <path d="M8 8c-2 0-3-1.3-3-2.5S6 3 8 4.5C9.5 5.7 12 8 12 8s2.5-2.3 4-3.5C18 3 19 4.3 19 5.5S18 8 16 8"/>
        </svg>
        <span>Kampanyalar</span>
      </button>

      <button class="nav-item nav-center" aria-label="QR">
        <div class="qr-circle">
          <svg viewBox="0 0 24 24" width="24" height="24" fill="white">
            <rect x="3" y="3" width="7" height="7" rx="1"/>
            <rect x="14" y="3" width="7" height="7" rx="1"/>
            <rect x="3" y="14" width="7" height="7" rx="1"/>
            <rect x="5.5" y="5.5" width="2" height="2" fill="#6d28d9"/>
            <rect x="16.5" y="5.5" width="2" height="2" fill="#6d28d9"/>
            <rect x="5.5" y="16.5" width="2" height="2" fill="#6d28d9"/>
            <rect x="14" y="14" width="3" height="3"/>
            <rect x="18" y="14" width="3" height="3"/>
            <rect x="14" y="18" width="3" height="3"/>
            <rect x="18" y="18" width="3" height="3"/>
          </svg>
        </div>
      </button>

      <button class="nav-item">
        <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="#1d1d1f" stroke-width="1.6" stroke-linejoin="round">
          <rect x="3" y="6" width="18" height="13" rx="2"/>
          <path d="M3 10h18"/>
          <circle cx="17" cy="14.5" r="1" fill="#1d1d1f"/>
        </svg>
        <span>Cüzdanım</span>
      </button>

      <button class="nav-item active">
        <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="#6d28d9" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 9.5l9-4.5 9 4.5-9 4.5z"/>
          <path d="M7 11.2v3.3c0 1.5 2.3 3 5 3s5-1.5 5-3v-3.3"/>
        </svg>
        <span>Profilim</span>
      </button>
    </nav>
  </div>

  <script src="app.js"></script>
</body>
</html>
